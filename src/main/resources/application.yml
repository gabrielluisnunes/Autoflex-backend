spring:
  application:
    name: autoflex-backend

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/autoflex?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/mysql

  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

autoflex:
  security:
    enabled: ${SECURITY_ENABLED:true}
    seed-default-users: ${SECURITY_SEED_DEFAULT_USERS:true}
    jwt:
      secret: ${JWT_SECRET:dGhpc0lzQVN1cGVyU2VjdXJlQmFzZTY0S2V5Rm9yQXV0b2ZsZXhKc3duVG9rZW5TaWduaW5nMTIzNDU2Nzg5MDEyMzQ=}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    "[org.hibernate.SQL]": info
